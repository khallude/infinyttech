    <text x="204" y="90" fill="#2A4030" font-size="8" font-family="ui-sans-serif,sans-serif">Backend</text>

    <rect x="194" y="112" width="68" height="44" rx="7" fill="#091614" stroke="#0F2C1E" stroke-width="0.8"/>
    <rect x="194" y="112" width="3" height="44" rx="1.5" fill="#22C55E"/>
    <text x="204" y="127" fill="#3D5570" font-size="9.5" font-family="ui-sans-serif,sans-serif">API Routes</text>
    <text x="204" y="140" fill="#2A4030" font-size="8" font-family="ui-sans-serif,sans-serif">Backend</text>

    <!-- footer -->
    <rect x="0" y="200" width="276" height="38" rx="0" fill="#080F1C"/>
    <rect x="0" y="200" width="276" height="14" fill="#080F1C"/>
    <rect x="0" y="224" width="276" height="14" rx="14" fill="#080F1C"/>
    <text x="14" y="221" fill="#2A3F55" font-size="8.5" font-family="ui-monospace,monospace">last push</text>
    <text x="68" y="221" fill="#2DD4BF" font-size="8.5" font-family="ui-monospace,monospace">feat: auth middleware → main</text>
    <text x="252" y="221" text-anchor="end" fill="#2A3F55" font-size="8.5" font-family="ui-monospace,monospace">2m</text>
  </g>

  <!-- ═══════════════════════════════════════════
       PANEL C — Terminal / Deploy Log (right)
  ═══════════════════════════════════════════ -->
  <g transform="translate(340, 52) rotate(3, 108, 108)" filter="url(#soft-shadow)">
    <rect width="210" height="220" rx="14" fill="#060C18" stroke="#1A3248" stroke-width="1"/>
    <!-- header -->
    <rect width="210" height="38" rx="14" fill="#09131F"/>
    <rect y="26" width="210" height="12" fill="#09131F"/>
    <circle cx="18" cy="19" r="4.5" fill="#EF4444" opacity="0.7"/>
    <circle cx="34" cy="19" r="4.5" fill="#F59E0B" opacity="0.7"/>
    <circle cx="50" cy="19" r="4.5" fill="#22C55E" opacity="0.7"/>
    <text x="130" y="23" text-anchor="middle" fill="#3A5470" font-size="9" font-family="ui-monospace,monospace">deploy.log — bash</text>

    <!-- log lines -->
    <text x="14" y="56" fill="#3A5470" font-size="9" font-family="ui-monospace,monospace">$ run deploy --env prod</text>

    <text x="14" y="74" fill="#2DD4BF" font-size="9" font-family="ui-monospace,monospace">[ok]</text>
    <text x="46" y="74" fill="#8AA4BE" font-size="9" font-family="ui-monospace,monospace">lint — 0 errors</text>

    <text x="14" y="90" fill="#2DD4BF" font-size="9" font-family="ui-monospace,monospace">[ok]</text>
    <text x="46" y="90" fill="#8AA4BE" font-size="9" font-family="ui-monospace,monospace">tests 212 passed</text>

    <text x="14" y="106" fill="#2DD4BF" font-size="9" font-family="ui-monospace,monospace">[ok]</text>
    <text x="46" y="106" fill="#8AA4BE" font-size="9" font-family="ui-monospace,monospace">migration v18</text>

    <text x="14" y="122" fill="#F59E0B" font-size="9" font-family="ui-monospace,monospace">[→]</text>
    <text x="46" y="122" fill="#8AA4BE" font-size="9" font-family="ui-monospace,monospace">canary 10 → 100%</text>

    <text x="14" y="138" fill="#22C55E" font-size="9" font-family="ui-monospace,monospace">[live]</text>
    <text x="52" y="138" fill="#E2E8F0" font-size="9" font-weight="600" font-family="ui-monospace,monospace">product-api</text>

    <text x="14" y="154" fill="#3A5470" font-size="9" font-family="ui-monospace,monospace">[trace]</text>
    <text x="58" y="154" fill="#2DD4BF" font-size="9" font-family="ui-monospace,monospace">p95 18ms ↓</text>

    <!-- cursor -->
    <text x="14" y="170" fill="#8AA4BE" font-size="9" font-family="ui-monospace,monospace">$</text>
    <rect x="26" y="159" width="7" height="13" rx="1" fill="#2DD4BF" opacity="0.85"/>

    <!-- status bar -->
    <line x1="0" y1="182" x2="210" y2="182" stroke="#0E1E30" stroke-width="1"/>
    <rect x="0" y="183" width="210" height="37" rx="0" fill="#07101A"/>
    <rect x="0" y="209" width="210" height="11" rx="11" fill="#07101A"/>
    <circle cx="18" cy="200" r="4" fill="#2DD4BF"/>
    <text x="28" y="204" fill="#2DD4BF" font-size="8.5" font-family="ui-monospace,monospace">prod</text>
    <text x="62" y="204" fill="#2A3F55" font-size="8.5" font-family="ui-monospace,monospace">release-2.5.1</text>
    <text x="196" y="204" text-anchor="end" fill="#2A3F55" font-size="8.5" font-family="ui-monospace,monospace">14:38 UTC</text>
  </g>

  <!-- accent dots / depth hints -->
  <circle cx="152" cy="108" r="3.5" fill="#2DD4BF" opacity="0.5"/>
  <circle cx="430" cy="320" r="2.5" fill="#2DD4BF" opacity="0.35"/>
  <circle cx="76" cy="344" r="2" fill="#2DD4BF" opacity="0.25"/>
