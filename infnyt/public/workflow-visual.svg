    <rect x="104" y="62" width="78" height="44" rx="7" fill="#0C2238" stroke="#1A3A55" stroke-width="0.8"/>
    <rect x="104" y="62" width="3" height="44" rx="1.5" fill="#818CF8"/>
    <text x="114" y="77" fill="#CBD5E1" font-size="9.5" font-weight="600" font-family="ui-sans-serif,sans-serif">Dashboard</text>
    <text x="114" y="90" fill="#3D5570" font-size="8" font-family="ui-sans-serif,sans-serif">Frontend · SK</text>

    <rect x="104" y="112" width="78" height="44" rx="7" fill="#0C2238" stroke="#1A3A55" stroke-width="0.8"/>
    <rect x="104" y="112" width="3" height="44" rx="1.5" fill="#818CF8"/>
    <text x="114" y="127" fill="#CBD5E1" font-size="9.5" font-weight="600" font-family="ui-sans-serif,sans-serif">Onboarding</text>
    <text x="114" y="140" fill="#3D5570" font-size="8" font-family="ui-sans-serif,sans-serif">Product · RM</text>

    <!-- DONE label -->
    <text x="194" y="56" fill="#3D5570" font-size="7.5" letter-spacing="1.2" font-family="ui-sans-serif,sans-serif">DONE</text>

    <rect x="194" y="62" width="68" height="44" rx="7" fill="#091614" stroke="#0F2C1E" stroke-width="0.8"/>
    <rect x="194" y="62" width="3" height="44" rx="1.5" fill="#22C55E"/>
