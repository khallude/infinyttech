<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440" width="560" height="440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060C18"/>
      <stop offset="100%" stop-color="#0C1A2E"/>
    </linearGradient>
    <radialGradient id="glow1" cx="45%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0E7490" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#0E7490" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#075F72" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#075F72" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#1C2D42" stroke-width="0.5"/>
    </pattern>
    <filter id="panel-shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="560" height="440" fill="url(#bg)" rx="20"/>
  <rect width="560" height="440" fill="url(#grid)" rx="20"/>
  <ellipse cx="248" cy="228" rx="230" ry="190" fill="url(#glow1)"/>
  <ellipse cx="420" cy="320" rx="160" ry="130" fill="url(#glow2)"/>

  <!-- ═══════════════════════════════════════════
       PANEL A — Deployment Pipeline (back-left)
  ═══════════════════════════════════════════ -->
  <g transform="translate(18, 52) rotate(-3, 130, 110)" filter="url(#panel-shadow)">
    <rect width="252" height="212" rx="14" fill="#0C1B2E" stroke="#1E3E5C" stroke-width="1"/>
    <!-- header bar -->
    <rect width="252" height="38" rx="14" fill="#0E2336"/>
    <rect y="26" width="252" height="12" fill="#0E2336"/>
    <circle cx="18" cy="19" r="4.5" fill="#EF4444" opacity="0.75"/>
    <circle cx="34" cy="19" r="4.5" fill="#F59E0B" opacity="0.75"/>
    <circle cx="50" cy="19" r="4.5" fill="#22C55E" opacity="0.75"/>
    <text x="148" y="23" text-anchor="middle" fill="#4A6580" font-size="10" font-family="ui-monospace,monospace">deployment pipeline</text>

    <!-- stage row -->
    <!-- build -->
    <rect x="14" y="52" width="58" height="38" rx="7" fill="#0A2740" stroke="#2DD4BF" stroke-width="1"/>
    <circle cx="26" cy="67" r="6" fill="#2DD4BF"/>
    <path d="M22.5 67 l3 3 5-5" stroke="#060C18" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="36" y="63" fill="#E2E8F0" font-size="9" font-family="ui-monospace,monospace">build</text>
    <text x="36" y="75" fill="#2DD4BF" font-size="8" font-family="ui-monospace,monospace">2m 14s</text>

    <!-- connector -->
    <line x1="72" y1="71" x2="88" y2="71" stroke="#2DD4BF" stroke-width="1.2" stroke-dasharray="3,2"/>
    <polygon points="87,68 93,71 87,74" fill="#2DD4BF"/>

    <!-- test -->
    <rect x="94" y="52" width="58" height="38" rx="7" fill="#0A2740" stroke="#2DD4BF" stroke-width="1"/>
    <circle cx="106" cy="67" r="6" fill="#2DD4BF"/>
    <path d="M102.5 67 l3 3 5-5" stroke="#060C18" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="116" y="63" fill="#E2E8F0" font-size="9" font-family="ui-monospace,monospace">test</text>
    <text x="116" y="75" fill="#2DD4BF" font-size="8" font-family="ui-monospace,monospace">212/212</text>

    <!-- connector -->
    <line x1="152" y1="71" x2="168" y2="71" stroke="#F59E0B" stroke-width="1.2" stroke-dasharray="3,2"/>
    <polygon points="167,68 173,71 167,74" fill="#F59E0B"/>

    <!-- staging -->
    <rect x="174" y="52" width="62" height="38" rx="7" fill="#1A1505" stroke="#F59E0B" stroke-width="1"/>
    <circle cx="186" cy="67" r="6" fill="#F59E0B"/>
    <text x="186" y="71" text-anchor="middle" fill="#060C18" font-size="10" font-family="ui-monospace,monospace">⟳</text>
    <text x="196" y="63" fill="#E2E8F0" font-size="9" font-family="ui-monospace,monospace">stage</text>
    <text x="196" y="75" fill="#F59E0B" font-size="8" font-family="ui-monospace,monospace">running</text>

    <!-- down connector -->
    <line x1="126" y1="90" x2="126" y2="108" stroke="#2A3F55" stroke-width="1"/>
    <polygon points="123,107 126,113 129,107" fill="#2A3F55"/>

    <!-- prod -->
    <rect x="76" y="114" width="100" height="38" rx="7" fill="#090E18" stroke="#2A3F55" stroke-width="1" stroke-dasharray="5,3"/>
    <circle cx="92" cy="133" r="6" fill="#2A3F55"/>
    <text x="104" y="129" fill="#4A6070" font-size="9" font-family="ui-monospace,monospace">prod</text>
    <text x="104" y="142" fill="#2A3F55" font-size="8" font-family="ui-monospace,monospace">waiting…</text>

    <!-- metrics strip -->
    <rect x="14" y="164" width="68" height="30" rx="7" fill="#091828"/>
    <text x="48" y="177" text-anchor="middle" fill="#2DD4BF" font-size="12" font-weight="bold" font-family="ui-sans-serif,sans-serif">99.98%</text>
    <text x="48" y="189" text-anchor="middle" fill="#4A6580" font-size="8" font-family="ui-sans-serif,sans-serif">uptime</text>

    <rect x="92" y="164" width="68" height="30" rx="7" fill="#091828"/>
    <text x="126" y="177" text-anchor="middle" fill="#2DD4BF" font-size="12" font-weight="bold" font-family="ui-sans-serif,sans-serif">18ms</text>
    <text x="126" y="189" text-anchor="middle" fill="#4A6580" font-size="8" font-family="ui-sans-serif,sans-serif">p95 latency</text>

    <rect x="170" y="164" width="68" height="30" rx="7" fill="#091828"/>
    <text x="204" y="177" text-anchor="middle" fill="#2DD4BF" font-size="12" font-weight="bold" font-family="ui-sans-serif,sans-serif">0</text>
    <text x="204" y="189" text-anchor="middle" fill="#4A6580" font-size="8" font-family="ui-sans-serif,sans-serif">incidents</text>
  </g>

  <!-- ═══════════════════════════════════════════
       PANEL B — Sprint Board (center-front)
  ═══════════════════════════════════════════ -->
  <g transform="translate(158, 130) rotate(1, 138, 118)" filter="url(#panel-shadow)">
    <rect width="276" height="238" rx="14" fill="#0A1828" stroke="#1A3650" stroke-width="1"/>
    <!-- header -->
    <rect width="276" height="38" rx="14" fill="#0E2136"/>
    <rect y="26" width="276" height="12" fill="#0E2136"/>
    <text x="14" y="23" fill="#64849E" font-size="10" font-family="ui-monospace,monospace">sprint-24 · release-2.5.1</text>
    <!-- progress -->
    <rect x="192" y="13" width="70" height="6" rx="3" fill="#172A40"/>
    <rect x="192" y="13" width="51" height="6" rx="3" fill="#2DD4BF"/>
    <text x="266" y="22" text-anchor="end" fill="#2DD4BF" font-size="8" font-family="ui-sans-serif,sans-serif">8/11</text>

