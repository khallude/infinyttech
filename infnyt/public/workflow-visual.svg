    <text x="24" y="127" fill="#CBD5E1" font-size="9.5" font-weight="600" font-family="ui-sans-serif,sans-serif">CI Pipeline</text>
    <text x="24" y="140" fill="#3D5570" font-size="8" font-family="ui-sans-serif,sans-serif">DevOps · DV</text>
    <rect x="24" y="145" width="42" height="4" rx="2" fill="#162A3E"/>
    <rect x="24" y="145" width="20" height="4" rx="2" fill="#F59E0B" opacity="0.65"/>

    <!-- REVIEW label -->
