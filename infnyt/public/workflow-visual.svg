    <rect x="24" y="95" width="32" height="4" rx="2" fill="#2DD4BF" opacity="0.65"/>

    <!-- card 2 -->
    <rect x="14" y="112" width="78" height="44" rx="7" fill="#0C2238" stroke="#1A3A55" stroke-width="0.8"/>
